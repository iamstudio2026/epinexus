name: CI + deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Tests (invariantes científicas)
        run: npm test
      - name: Build (smoke)
        run: npm run build
        env:
          VITE_RAG_ENDPOINT: https://n8n.iamstudio.cloud/webhook/epinexus-rag

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 72.60.164.54 >> ~/.ssh/known_hosts 2>/dev/null
      - name: Trigger redeploy on VPS
        run: |
          ssh root@72.60.164.54 \
            "VITE_SUPABASE_URL='${{ secrets.VITE_SUPABASE_URL }}' \
             VITE_SUPABASE_ANON_KEY='${{ secrets.VITE_SUPABASE_ANON_KEY }}' \
             /opt/epinexus/redeploy.sh"
      - name: Smoke test
        run: |
          sleep 5
          curl -sf -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            https://epinexus.iamstudio.cloud
