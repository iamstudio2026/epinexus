# /etc/nginx/sites-available/epinexus.conf
# Reemplaza __DOMAIN__ por tu subdominio (p.ej. epinexus.iamstudio.cloud)
# y __ROOT__ por la ruta donde rsync deja dist/ (p.ej. /var/www/epinexus)

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Redirect HTTP -> HTTPS (certbot añadirá el bloque 443 con cert paths)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    root __ROOT__;
    index index.html;

    # Certificados — certbot --nginx los pondrá automáticamente. Placeholder:
    # ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Si todo el contenido lo sirves tú, puedes endurecer CSP. Ejemplo permisivo:
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://n8n.iamstudio.cloud https://*.supabase.co;" always;

    # Assets con hash → cacheo agresivo
    location ~* \.(?:js|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/epinexus.access.log;
    error_log  /var/log/nginx/epinexus.error.log;
}
